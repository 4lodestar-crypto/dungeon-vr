# CI Pipeline for Dungeon VR
# Builds Windows Desktop standalone, runs EditMode tests, collects coverage.
# Uses Unity Personal (free tier) via unity-ci/actions.

name: CI

on:
  push:
    branches: [develop, feat/*]
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Lint ----------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .gitignore covers Unity files
        run: |
          for pattern in "Library/" "Temp/" "Obj/" "Build/"; do
            if grep -q "^${pattern}" .gitignore; then
              echo "PASS: .gitignore covers ${pattern}"
            else
              echo "FAIL: .gitignore missing ${pattern}"
              exit 1
            fi
          done

      - name: Check YAML validity
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/ci.yml')); print('CI YAML is valid')"

  # ---------- Build Windows Standalone ----------
  build-windows:
    name: Build Windows Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library/
          key: Library-${{ hashFiles('Packages/manifest.json') }}-6000.0.23f1
          restore-keys: |
            Library-${{ hashFiles('Packages/manifest.json') }}-
            Library-

      - name: Unity Build (Win64)
        uses: unity-ci/action@v2
        with:
          buildMethod: BuildScript.PerformWin64Build
          targetPlatform: StandaloneWindows64
          unityVersion: 6000.0.23f1
          projectPath: .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonVR-Win64
          path: Build/
          retention-days: 7

  # ---------- EditMode Tests ----------
  test-editmode:
    name: EditMode Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library/
          key: Library-${{ hashFiles('Packages/manifest.json') }}-6000.0.23f1
          restore-keys: |
            Library-${{ hashFiles('Packages/manifest.json') }}-
            Library-

      - name: Unity EditMode Tests
        uses: unity-ci/action@v2
        with:
          testMode: EditMode
          unityVersion: 6000.0.23f1
          projectPath: .

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: EditMode-Test-Results
          path: |
            **/TestResults.xml
            **/*.xml
          retention-days: 30

  # ---------- Code Coverage ----------
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test-editmode]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library/
          key: Library-${{ hashFiles('Packages/manifest.json') }}-6000.0.23f1
          restore-keys: |
            Library-${{ hashFiles('Packages/manifest.json') }}-
            Library-

      - name: Unity Coverage Tests
        uses: unity-ci/action@v2
        with:
          testMode: EditMode
          enableCoverage: true
          unityVersion: 6000.0.23f1
          projectPath: .

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Code-Coverage-Report
          path: Assets/Tests/Coverage/
          retention-days: 30

  # ---------- Summary ----------
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, test-editmode]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "## CI Summary for ${{ github.sha }}"
          echo ""
          echo "| Job | Status |"
          echo "|------|--------|"
          echo "| Build Windows | ${{ needs.build-windows.result }} |"
          echo "| EditMode Tests | ${{ needs.test-editmode.result }} |"
          echo "| Code Coverage | ${{ needs.coverage.result }} |"
