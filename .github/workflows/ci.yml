# =============================================================================
# Dungeon VR — CI Pipeline (game-ci)
# =============================================================================
# Unity 6 LTS (6000.4.10f1) CI pipeline using game-ci actions.
# Builds on every push/PR to main and develop. Runs EditMode tests.
#
# REQUIRED GITHUB SECRETS:
#   UNITY_EMAIL     — Unity account email
#   UNITY_PASSWORD  — Unity account password
#   UNITY_SERIAL    — Unity Plus/Pro serial (from id.unity.com/subscriptions)
#
# NOTE: Unity 6 uses entitlements-based licensing. The old UNITY_LICENSE
#       (base64 .ulf) approach does NOT work. Use EMAIL+PASSWORD+SERIAL.
# =============================================================================

name: Dungeon VR CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test (Unity 6000.4.10f1)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Step 2: Cache Unity Library
      # -----------------------------------------------------------------------
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-DungeonVR-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-DungeonVR-
            Library-

      # -----------------------------------------------------------------------
      # Step 3: Build (game-ci/unity-builder)
      # -----------------------------------------------------------------------
      # Builds the project in batch mode. Catching compile errors is the
      # primary goal at this stage — no actual APK/build artifact needed yet.
      # Target: StandaloneWindows64 (fastest compile, no Android SDK needed).
      # -----------------------------------------------------------------------
      - name: Build Unity project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          unityVersion: 6000.4.10f1
          targetPlatform: StandaloneWindows64
          buildMethod: ''
          allowDirtyBuild: true

      # -----------------------------------------------------------------------
      # Step 4: EditMode Tests (game-ci/unity-test-runner)
      # -----------------------------------------------------------------------
      # DungeonVR.Tests assembly under Assets/Tests/EditMode/
      #   14 tests: 6 GridMovement + 5 TickLoop + 3 MovementIntegration
      # -----------------------------------------------------------------------
      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          unityVersion: 6000.4.10f1
          testMode: editmode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode Test Results

      # -----------------------------------------------------------------------
      # Step 5: Upload test results artifact
      # -----------------------------------------------------------------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      # -----------------------------------------------------------------------
      # Step 6: Upload build artifact
      # -----------------------------------------------------------------------
      - name: Upload build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DungeonVR-Win64
          path: build/StandaloneWindows64/
          retention-days: 7
