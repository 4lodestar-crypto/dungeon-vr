# CI Pipeline for Dungeon VR
name: CI

on:
  push:
    branches: [develop, feat/*]
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UNITY_VERSION: 6000.4.10f1
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Verify .gitignore
        run: |
          for p in Library Temp Obj Build; do
            s=$(sed -E 's/\[([a-z])[a-z]\]/\1/g' .gitignore | grep -qiE "^/?$p/") && echo "PASS: $p" || { echo "FAIL: $p"; exit 1; }
          done
      - name: Check YAML
        run: python3 -c "import yaml; yaml.safe_load(open('.github/workflows/ci.yml')); print('valid')"

  activate-license:
    name: Activate Unity License
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: game-ci/unity-activate@v2
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: .

  build-windows:
    name: Build Windows Desktop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [activate-license]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/cache@v4
        with:
          path: Library/
          key: Library-${{ hashFiles('Packages/manifest.json') }}-${{ env.UNITY_VERSION }}
          restore-keys: Library-${{ hashFiles('Packages/manifest.json') }}-
      - uses: game-ci/unity-builder@v5
        with:
          buildMethod: BuildScript.PerformWin64Build
          targetPlatform: StandaloneWindows64
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: .
          allowDirtyBuild: false
      - uses: actions/upload-artifact@v4
        with:
          name: DungeonVR-Win64
          path: Build/
          retention-days: 7

  runtime-smoke-test:
    name: Runtime Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-windows]
    if: always() && needs.build-windows.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: DungeonVR-Win64
          path: Build/
      - name: Smoke test
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 wine32 2>&1 | tail -3
          exe=$(find Build/ -name '*.exe' | head -1)
          [ -z "$exe" ] && { echo "FAIL: no exe"; exit 1; }
          echo "Testing: $exe"
          timeout 30 wine "$exe" -batchmode -nographics -quit 2>&1 || true
          rc=$?; [ $rc -eq 0 ] && echo "PASS" || [ $rc -eq 124 ] && echo "PASS (timeout)" || { echo "FAIL: $rc"; exit 1; }

  test-editmode:
    name: EditMode Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [activate-license]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/cache@v4
        with:
          path: Library/
          key: Library-${{ hashFiles('Packages/manifest.json') }}-${{ env.UNITY_VERSION }}
          restore-keys: Library-${{ hashFiles('Packages/manifest.json') }}-
      - uses: game-ci/unity-test-runner@v4
        with:
          testMode: EditMode
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: .
          artifactsPath: Tests/EditMode-Results
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EditMode-Test-Results
          path: Tests/EditMode-Results/
          retention-days: 30

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-editmode]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/cache@v4
        with:
          path: Library/
          key: Library-${{ hashFiles('Packages/manifest.json') }}-${{ env.UNITY_VERSION }}
          restore-keys: Library-${{ hashFiles('Packages/manifest.json') }}-
      - uses: game-ci/unity-test-runner@v4
        with:
          testMode: EditMode
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: .
          artifactsPath: Tests/Coverage-Results
          enableCoverage: true
          coverageOptions: 'generateHtmlReport;generateBadgeReport;assemblyFilters:+DungeonVR.*'
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Code-Coverage-Report
          path: Tests/Coverage-Results/
          retention-days: 30

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, test-editmode, coverage, runtime-smoke-test]
    if: always()
    steps:
      - run: |
          echo "## CI Summary for ${{ github.sha }}"
          echo "**Build:** ${{ needs.build-windows.result }}"
          echo "**Tests:** ${{ needs.test-editmode.result }}"
          echo "**Coverage:** ${{ needs.coverage.result }}"
          echo "**Smoke:** ${{ needs.runtime-smoke-test.result }}"
